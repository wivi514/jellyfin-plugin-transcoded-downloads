<!DOCTYPE html>
<html>
<head>
    <title>Transcoded Downloads</title>
    <style>
        .transcodedDownloadsPage {
            --td-gap: 1.25rem;
            --td-border: rgba(255, 255, 255, .16);
            --td-muted: rgba(255, 255, 255, .62);
            --td-row: rgba(255, 255, 255, .04);
            --td-row-hover: rgba(255, 255, 255, .07);
        }

        .transcodedDownloadsPage .td-header {
            align-items: center;
            display: flex;
            gap: 1rem;
            justify-content: space-between;
            margin: 0 0 1.5rem;
        }

        .transcodedDownloadsPage .td-title {
            margin: 0;
        }

        .transcodedDownloadsPage .td-actions {
            align-items: center;
            display: flex;
            flex-wrap: wrap;
            gap: .5rem;
            justify-content: flex-end;
        }

        .transcodedDownloadsPage .td-status {
            color: var(--td-muted);
            font-size: .9rem;
            min-height: 1.5rem;
            padding-top: .2rem;
        }

        .transcodedDownloadsPage .td-summary {
            display: grid;
            gap: 0;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            margin: 0 0 1.5rem;
        }

        .transcodedDownloadsPage .td-metric {
            border-bottom: 1px solid var(--td-border);
            border-top: 1px solid var(--td-border);
            min-width: 0;
            padding: .75rem 1rem;
        }

        .transcodedDownloadsPage .td-metric + .td-metric {
            border-left: 1px solid var(--td-border);
        }

        .transcodedDownloadsPage .td-metric-value {
            display: block;
            font-size: 1.15rem;
            font-weight: 600;
            line-height: 1.2;
        }

        .transcodedDownloadsPage .td-metric-label {
            color: var(--td-muted);
            display: block;
            font-size: .84rem;
            margin-top: .2rem;
        }

        .transcodedDownloadsPage .td-section {
            border-top: 1px solid var(--td-border);
            margin-top: 1.75rem;
            padding-top: 1.35rem;
        }

        .transcodedDownloadsPage .td-section-head {
            align-items: center;
            display: flex;
            gap: 1rem;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .transcodedDownloadsPage .td-section-head .sectionTitle {
            margin: 0;
        }

        .transcodedDownloadsPage .td-settings-grid,
        .transcodedDownloadsPage .td-editor-grid {
            display: grid;
            gap: .85rem 1rem;
            grid-template-columns: repeat(auto-fit, minmax(15rem, 1fr));
        }

        .transcodedDownloadsPage .td-quick-panel {
            border-bottom: 1px solid var(--td-border);
            border-top: 1px solid var(--td-border);
            display: grid;
            gap: .85rem 1rem;
            grid-template-columns: minmax(11rem, .8fr) minmax(18rem, 2fr);
            margin-bottom: 1.25rem;
            padding: 1rem 0;
        }

        .transcodedDownloadsPage .td-quick-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: .35rem;
        }

        .transcodedDownloadsPage .td-quick-copy {
            color: var(--td-muted);
            font-size: .9rem;
            line-height: 1.35;
            margin: 0;
        }

        .transcodedDownloadsPage .td-range-row {
            align-items: center;
            display: grid;
            gap: .75rem;
            grid-template-columns: minmax(8rem, 1fr) 5rem;
        }

        .transcodedDownloadsPage .td-range-row input[type="range"] {
            min-width: 0;
            width: 100%;
        }

        .transcodedDownloadsPage .td-toggle-list {
            display: grid;
            gap: .2rem;
        }

        .transcodedDownloadsPage .td-toggle-row {
            align-items: center;
            display: flex;
            gap: .75rem;
            justify-content: space-between;
            min-height: 2.5rem;
            padding: .15rem 0;
        }

        .transcodedDownloadsPage .td-toggle-row label {
            margin: 0;
        }

        .transcodedDownloadsPage .td-panel-list {
            display: grid;
            gap: .65rem;
        }

        .transcodedDownloadsPage .td-details {
            border: 1px solid var(--td-border);
            border-radius: 8px;
            background: var(--td-row);
            overflow: hidden;
        }

        .transcodedDownloadsPage .td-details[open] {
            background: transparent;
        }

        .transcodedDownloadsPage .td-details-summary {
            align-items: center;
            cursor: pointer;
            display: grid;
            gap: .75rem;
            grid-template-columns: minmax(0, 1fr) auto auto;
            list-style: none;
            min-height: 3.25rem;
            padding: .55rem .75rem;
        }

        .transcodedDownloadsPage .td-details-summary:hover {
            background: var(--td-row-hover);
        }

        .transcodedDownloadsPage .td-details-summary::-webkit-details-marker {
            display: none;
        }

        .transcodedDownloadsPage .td-row-main {
            min-width: 0;
        }

        .transcodedDownloadsPage .td-row-title {
            display: block;
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .transcodedDownloadsPage .td-row-subtitle {
            color: var(--td-muted);
            display: block;
            font-size: .84rem;
            margin-top: .2rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .transcodedDownloadsPage .td-details-body {
            border-top: 1px solid var(--td-border);
            padding: 1rem;
        }

        .transcodedDownloadsPage .td-field-grid {
            display: grid;
            gap: .75rem;
            grid-template-columns: repeat(auto-fit, minmax(12rem, 1fr));
        }

        .transcodedDownloadsPage .td-field-wide {
            grid-column: 1 / -1;
        }

        .transcodedDownloadsPage .td-chip-row {
            display: flex;
            flex-wrap: wrap;
            gap: .4rem;
            justify-content: flex-end;
            min-width: 9rem;
        }

        .transcodedDownloadsPage .td-chip {
            border: 1px solid var(--td-border);
            border-radius: 999px;
            color: var(--td-muted);
            display: inline-flex;
            font-size: .78rem;
            line-height: 1;
            padding: .35rem .55rem;
            white-space: nowrap;
        }

        .transcodedDownloadsPage .td-inline-checks {
            display: grid;
            gap: .5rem;
            grid-template-columns: repeat(auto-fit, minmax(11rem, 1fr));
            margin-top: .75rem;
        }

        .transcodedDownloadsPage .td-check {
            align-items: center;
            display: flex;
            gap: .55rem;
            min-height: 2.4rem;
            padding: .25rem 0;
        }

        .transcodedDownloadsPage .td-check span {
            color: var(--td-muted);
            font-size: .88rem;
        }

        .transcodedDownloadsPage .td-icon-button {
            min-width: 2.6rem;
            width: 2.6rem;
        }

        .transcodedDownloadsPage .td-row-actions {
            align-items: center;
            display: flex;
            gap: .25rem;
        }

        .transcodedDownloadsPage .td-empty {
            border: 1px dashed var(--td-border);
            border-radius: 8px;
            color: var(--td-muted);
            padding: 1rem;
        }

        @media (max-width: 43rem) {
            .transcodedDownloadsPage .td-header,
            .transcodedDownloadsPage .td-section-head,
            .transcodedDownloadsPage .td-quick-panel {
                display: grid;
            }

            .transcodedDownloadsPage .td-summary {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .transcodedDownloadsPage .td-metric:nth-child(3) {
                border-left: 0;
            }

            .transcodedDownloadsPage .td-actions {
                justify-content: flex-start;
            }

            .transcodedDownloadsPage .td-details-summary {
                grid-template-columns: minmax(0, 1fr) auto;
            }

            .transcodedDownloadsPage .td-chip-row {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="transcoded-downloads-config-page" data-role="page" class="page type-interior pluginConfigurationPage transcodedDownloadsPage">
        <div data-role="content">
            <div class="content-primary">
                <form id="transcoded-downloads-config-form">
                    <div class="td-header">
                        <div>
                            <h2 class="sectionTitle td-title">Transcoded Downloads</h2>
                            <div id="td-status" class="td-status"></div>
                        </div>
                        <div class="td-actions">
                            <button type="submit" is="emby-button" class="raised button-submit">
                                <span class="material-icons" aria-hidden="true">save</span>
                                <span>Save</span>
                            </button>
                            <button id="td-reset-defaults" type="button" is="emby-button" class="raised">
                                <span class="material-icons" aria-hidden="true">restart_alt</span>
                                <span>Reset</span>
                            </button>
                        </div>
                    </div>

                    <div class="td-summary">
                        <div class="td-metric">
                            <span id="td-summary-presets" class="td-metric-value">0</span>
                            <span class="td-metric-label">Presets</span>
                        </div>
                        <div class="td-metric">
                            <span id="td-summary-profiles" class="td-metric-value">0</span>
                            <span class="td-metric-label">Profiles</span>
                        </div>
                        <div class="td-metric">
                            <span id="td-summary-concurrency" class="td-metric-value">1</span>
                            <span class="td-metric-label">Concurrent jobs</span>
                        </div>
                        <div class="td-metric">
                            <span id="td-summary-retention" class="td-metric-value">24h</span>
                            <span class="td-metric-label">Retention</span>
                        </div>
                    </div>

                    <div class="td-section">
                        <div class="td-section-head">
                            <h3 class="sectionTitle">General</h3>
                        </div>
                        <div class="td-settings-grid">
                            <div class="td-toggle-list">
                                <div class="td-toggle-row">
                                    <label for="td-enable-video">Video downloads</label>
                                    <input id="td-enable-video" type="checkbox" is="emby-checkbox" />
                                </div>
                                <div class="td-toggle-row">
                                    <label for="td-enable-music">Music downloads</label>
                                    <input id="td-enable-music" type="checkbox" is="emby-checkbox" />
                                </div>
                                <div class="td-toggle-row">
                                    <label for="td-enable-web-ui">Web item button</label>
                                    <input id="td-enable-web-ui" type="checkbox" is="emby-checkbox" />
                                </div>
                                <div class="td-toggle-row">
                                    <label for="td-enable-advanced-ffmpeg">Advanced FFmpeg arguments</label>
                                    <input id="td-enable-advanced-ffmpeg" type="checkbox" is="emby-checkbox" />
                                </div>
                            </div>

                            <div class="td-editor-grid">
                                <div class="inputContainer td-field-wide">
                                    <label class="inputLabel inputLabelUnfocused" for="td-temp-directory">Temporary directory</label>
                                    <input id="td-temp-directory" type="text" is="emby-input" />
                                </div>
                                <div class="inputContainer">
                                    <label class="inputLabel inputLabelUnfocused" for="td-max-concurrent">Concurrent jobs</label>
                                    <input id="td-max-concurrent" type="number" min="1" step="1" is="emby-input" />
                                </div>
                                <div class="inputContainer">
                                    <label class="inputLabel inputLabelUnfocused" for="td-max-queue">Queue size</label>
                                    <input id="td-max-queue" type="number" min="1" step="1" is="emby-input" />
                                </div>
                                <div class="inputContainer">
                                    <label class="inputLabel inputLabelUnfocused" for="td-retention-hours">Retention hours</label>
                                    <input id="td-retention-hours" type="number" min="1" step="1" is="emby-input" />
                                </div>
                                <div class="inputContainer">
                                    <label class="inputLabel inputLabelUnfocused" for="td-max-temp-size">Temp size MB</label>
                                    <input id="td-max-temp-size" type="number" min="1" step="1" is="emby-input" />
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="td-section">
                        <div class="td-section-head">
                            <h3 class="sectionTitle">Presets</h3>
                            <button id="td-add-preset" type="button" is="emby-button" class="raised button-submit">
                                <span class="material-icons" aria-hidden="true">add</span>
                                <span>Add Preset</span>
                            </button>
                        </div>
                        <div class="td-quick-panel">
                            <div>
                                <div class="td-quick-title">Simple compatibility preset</div>
                                <p class="td-quick-copy">Creates an H.264 AAC MP4 preset for broad device support. Choose a size and bitrate, then save.</p>
                            </div>
                            <div class="td-editor-grid">
                                <div class="inputContainer">
                                    <label class="inputLabel inputLabelUnfocused" for="td-simple-resolution">Resolution</label>
                                    <select id="td-simple-resolution" is="emby-select" class="emby-select-withcolor emby-select">
                                        <option value="854x480">480p</option>
                                        <option value="1280x720">720p</option>
                                        <option value="1920x1080" selected>1080p</option>
                                        <option value="2560x1440">1440p</option>
                                        <option value="3840x2160">4K</option>
                                    </select>
                                </div>
                                <div class="inputContainer">
                                    <label class="inputLabel inputLabelUnfocused" for="td-simple-bitrate">Video bitrate, Mbps</label>
                                    <div class="td-range-row">
                                        <input id="td-simple-bitrate" type="range" min="2" max="80" step="1" value="8" />
                                        <input id="td-simple-bitrate-number" type="number" min="2" max="80" step="1" value="8" is="emby-input" />
                                    </div>
                                </div>
                                <button id="td-add-simple-h264" type="button" is="emby-button" class="raised button-submit">
                                    <span class="material-icons" aria-hidden="true">add_circle</span>
                                    <span>Add H.264 Preset</span>
                                </button>
                                <button id="td-add-popular-presets" type="button" is="emby-button" class="raised">
                                    <span class="material-icons" aria-hidden="true">playlist_add</span>
                                    <span>Add Popular Set</span>
                                </button>
                            </div>
                        </div>
                        <div id="td-preset-rows" class="td-panel-list"></div>
                    </div>

                    <div class="td-section">
                        <div class="td-section-head">
                            <h3 class="sectionTitle">Capability Profiles</h3>
                            <button id="td-add-profile" type="button" is="emby-button" class="raised button-submit">
                                <span class="material-icons" aria-hidden="true">add</span>
                                <span>Add Profile</span>
                            </button>
                        </div>
                        <div id="td-profile-rows" class="td-panel-list"></div>
                    </div>
                </form>
            </div>
        </div>
        <script src="configurationpage?name=transcodeddownloadsjs"></script>
    </div>
</body>
</html>
